<body>
<nav>
  <div class="navbar bg-base-100 shadow-sm px-4 md:px-12"> <div class="flex-1 flex items-center gap-2"> <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8 md:w-10 md:h-10"> <a class="text-lg md:text-xl font-bold cursor-pointer">GitHub Issues Tracker</a>
    </div>

    <div class="flex items-center ">
     <div class="flex items-center gap-4">
       
      <div class="hidden md:block"> 
         <input type="text" placeholder="Search issues..." class="input input-bordered w-full max-w-xs" />
      </div>
        <div class="p-3">
            <button class="btn btn-primary">+New Issue</button>
          </div>
        
      
    </div>

  </div>

      All
    </button>
    <button class="btn btn-soft btn-primary flex-1 sm:flex-none  px-6 py-2 rounded-md font-medium  ">

    </button>
    <button class="btn btn-soft btn-primary flex-1 sm:flex-none px-6 py-2 rounded-md font-medium ">

    </button>
  </div>

      </div>
      
      <div>
        <h2 class="text-base sm:text-lg font-bold text-gray-800 leading-tight">50 Issues</h2>
        <p class="text-xs sm:text-sm text-gray-500">Track and manage your project issues</p>
      </div>
    </div>

    <div class="flex  gap-6 text-sm font-medium text-gray-700 ml-14 sm:ml-0">
      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 bg-emerald-700 rounded-full"></span>
        Open
      </div>
      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 bg-blue-700 rounded-full"></span>
