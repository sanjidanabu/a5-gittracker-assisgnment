<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git | login</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- daisyui+tailwind  -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google font -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  
<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />



<style>
    *{
        font-family: "Inter", sans-serif;
    }
</style>

</head>
<body >
  <div class="min-h-screen bg-[#F8FAFC] flex items-center justify-center p-4">
  
  <div class="bg-[#FFFFFF] p-8 rounded-lg shadow-md w-full max-w-md text-center">
    
    <div class="mb-6 ">
      <img src="assets/github-logo.png" alt="Logo" class="w-16 h-16 mx-auto mb-2">
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
    </div>
       <div class="card-body  ">
        <fieldset class="fieldset space-y-2">
          <label class="label text-black font-semibold ">Username</label>
          <input type="email" class="input" placeholder="Enter Username" />
          <label class="label text-black font-semibold">Password</label>
          <input type="password" class="input" placeholder="Enter Password" />
         
          <button class="btn btn-primary">Sign In</button>
        </fieldset>
      </div>
    
    

  </div>
</div>
</body>
</html>
